name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend smoke-test dependencies
        run: python -m pip install fastapi python-multipart pydantic pytest httpx

      - name: Compile backend sources
        run: python -m py_compile backend/app/main.py backend/app/ocr.py

      - name: Verify backend app imports
        run: PYTHONPATH=backend python -c "from app.main import app; print(app.title)"

      - name: Run backend smoke tests
        run: PYTHONPATH=backend pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
